name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # goreleaser builds the changelog from git history

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Test
        run: make check

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.9

      - name: Install pinned web dependencies
        run: cd web && bun ci

      - name: Install binaryen (wasm-opt)
        run: |
          curl -fsSLO https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz
          curl -fsSLO https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz.sha256
          sha256sum -c binaryen-version_130-x86_64-linux.tar.gz.sha256
          tar xzf binaryen-version_130-x86_64-linux.tar.gz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/binaryen-version_130/bin" >> "$GITHUB_PATH"

      - name: Typecheck web app
        run: make web-check

      - name: Bun unit tests
        run: make web-test

      - name: Build production web artifact
        run: make web-build

      - name: Install Chromium
        run: cd web && bunx playwright install --with-deps chromium

      - name: Browser smoke test
        run: SMOKE_DIST=1 make web-smoke

      - name: Release binaries
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
