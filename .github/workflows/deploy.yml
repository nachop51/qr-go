name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25.x'

      - name: Validate Go sources and dependencies
        run: |
          make check
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.9

      - name: Install pinned web dependencies
        run: cd web && bun ci

      - name: Install binaryen (wasm-opt)
        run: |
          curl -fsSLO https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz
          curl -fsSLO https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz.sha256
          sha256sum -c binaryen-version_130-x86_64-linux.tar.gz.sha256
          tar xzf binaryen-version_130-x86_64-linux.tar.gz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/binaryen-version_130/bin" >> "$GITHUB_PATH"

      - name: Validate web sources
        run: |
          make web-check
          make web-test

      - name: Build web bundle
        run: make web-build

      - name: Install Chromium
        run: cd web && bunx playwright install --with-deps chromium

      - name: Browser smoke test of deploy artifact
        run: SMOKE_DIST=1 make web-smoke

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages deploy web/dist --project-name=qr-go
