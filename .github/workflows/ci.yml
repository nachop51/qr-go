name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Check (fmt, vet, build, race tests)
        run: make check

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install binaryen (wasm-opt)
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz | tar xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/binaryen-version_130/bin" >> "$GITHUB_PATH"

      - name: Typecheck web app
        run: make web-check

      - name: Build web bundle
        run: make web-build
